name: Build APK

on:
  push:
    paths:
      - "android-src.zip"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Unpack app source
        run: unzip -q android-src.zip -d build-src

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: build-src
        run: gradle assembleDebug --no-daemon

      - name: Build signed release AAB
        working-directory: build-src
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks" gradle bundleRelease --no-daemon

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build-src/app/build/outputs/apk/debug/app-debug.apk DutchFlashcards-debug.apk
          cp build-src/app/build/outputs/bundle/release/app-release.aab DutchFlashcards-release.aab
          gh release create "apk-run-${{ github.run_number }}" DutchFlashcards-debug.apk DutchFlashcards-release.aab \
            --title "Dutch Flashcards build ${{ github.run_number }}" \
            --notes "Debug APK (sideload) + signed release AAB (Play Store upload)." \
            --repo "${{ github.repository }}"
