name: Build APK

on:
  push:
    paths:
      - "android-src.zip"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Unpack app source
        run: unzip -q android-src.zip -d build-src

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: build-src
        run: gradle assembleDebug --no-daemon

      - name: Publish APK as release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build-src/app/build/outputs/apk/debug/app-debug.apk DutchFlashcards-debug.apk
          gh release create "apk-run-${{ github.run_number }}" DutchFlashcards-debug.apk \
            --title "Dutch Flashcards debug APK (build ${{ github.run_number }})" \
            --notes "Sideload-ready debug build, generated by CI." \
            --repo "${{ github.repository }}"
